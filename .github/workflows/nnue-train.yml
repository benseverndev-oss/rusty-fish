name: NNUE Training

on:
  workflow_dispatch:
    inputs:
      plies:
        description: Plies of self-play per seed position
        required: true
        default: "64"
        type: string
      label_depth:
        description: Search depth for teacher labels (0 = static evaluation)
        required: true
        default: "6"
        type: string
      epochs:
        description: Training epochs
        required: true
        default: "150"
        type: string

permissions:
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Train a bootstrap NNUE network
        run: |
          mkdir -p artifacts
          cargo run --release -p engine-bench -- \
            train artifacts/rusty-fish.rfnn \
            "${{ inputs.plies }}" "${{ inputs.label_depth }}" "${{ inputs.epochs }}"
      - name: Gate the network against the baseline (SPRT)
        run: |
          cargo run --release -p engine-bench -- nnue-sprt artifacts/rusty-fish.rfnn 5 \
            > artifacts/nnue-sprt.tsv
          cat artifacts/nnue-sprt.tsv
      - name: Upload trained network and SPRT verdict
        uses: actions/upload-artifact@v4
        with:
          name: rusty-fish-nnue
          path: |
            artifacts/rusty-fish.rfnn
            artifacts/nnue-sprt.tsv
