name: Rusty Fish Tests

on:
  push:
    paths:
      - 'engine-core/**'
      - 'engine-search/**'
      - 'engine-bench/**'
      - 'engine-uci/**'
      - 'app-desktop/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/engine-core-perft.yml'
  pull_request:
    paths:
      - 'engine-core/**'
      - 'engine-search/**'
      - 'engine-bench/**'
      - 'engine-uci/**'
      - 'app-desktop/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/engine-core-perft.yml'
  workflow_dispatch:
    inputs:
      test_filter:
        description: Cargo test filter
        required: true
        default: standard_perft_corpus_regression
        type: string

jobs:
  workspace:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run workspace tests
        run: cargo test --workspace
  engine-core:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run targeted engine-core test
        run: cargo test -p engine-core "${{ inputs.test_filter }}" -- --nocapture
