name: SPSA Tuning

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: Number of SPSA iterations
        required: true
        default: "40"
        type: string
      gate_openings:
        description: Openings for the out-of-sample gate (games = 2x)
        required: true
        default: "96"
        type: string
      gate_depth:
        description: Search depth for the out-of-sample gate
        required: true
        default: "4"
        type: string
      use_nnue:
        description: Tune/validate against the shipped NNUE eval (1) or hand-crafted (0)
        required: true
        default: "1"
        type: string

permissions:
  contents: read

jobs:
  spsa:
    runs-on: ubuntu-latest
    # Generous budget: spsa self-play in NNUE mode is slow, and the 192-game gate
    # needs headroom after it. 90 min was too tight (campaign alone ate ~70 min).
    timeout-minutes: 180
    env:
      RUSTY_FISH_SPSA_NNUE: ${{ inputs.use_nnue }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build engine-bench
        run: cargo build --release -p engine-bench
      - name: Run SPSA tuning campaign
        run: |
          mkdir -p artifacts
          ./target/release/engine-bench spsa "${{ inputs.iterations }}" > artifacts/spsa-tuning.tsv
          # Extract the tuned params here so they survive even if a later step is
          # cut off: the tuned SearchParams are the last row's 8 param cols (7..14).
          tail -1 artifacts/spsa-tuning.tsv | cut -f7-14 > artifacts/tuned.tsv
          {
            echo "## SPSA campaign (NNUE mode = $RUSTY_FISH_SPSA_NNUE, ${{ inputs.iterations }} iterations)"
            echo '```'
            head -1 artifacts/spsa-tuning.tsv
            tail -3 artifacts/spsa-tuning.tsv
            echo "tuned (aspiration razor_b razor_s rfp_b rfp_s lmp_b lmp_s null): $(cat artifacts/tuned.tsv)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload campaign params (pre-gate, always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spsa-campaign
          path: |
            artifacts/spsa-tuning.tsv
            artifacts/tuned.tsv
          if-no-files-found: ignore
      - name: Out-of-sample gate (tuned vs default)
        run: |
          echo "TUNED_PARAMS=$(cat artifacts/tuned.tsv)"
          ./target/release/engine-bench search-gate artifacts/tuned.tsv \
            "${{ inputs.gate_openings }}" "${{ inputs.gate_depth }}" | tee artifacts/search-gate.tsv
          {
            echo "## Out-of-sample gate: tuned vs default (depth ${{ inputs.gate_depth }}, ${{ inputs.gate_openings }} openings x2)"
            echo "Default: aspiration=50 razor=120/80 rfp=100/90 lmp=3/2 null=3"
            echo '```'
            echo "tuned (aspiration razor_b razor_s rfp_b rfp_s lmp_b lmp_s null): $(cat artifacts/tuned.tsv)"
            cat artifacts/search-gate.tsv
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spsa-tuning
          path: artifacts/
          if-no-files-found: ignore
