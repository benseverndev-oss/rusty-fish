name: SPSA Tuning

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: Number of SPSA iterations
        required: true
        default: "32"
        type: string

jobs:
  spsa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run SPSA tuning campaign
        run: |
          mkdir -p artifacts
          cargo run --release -p engine-bench -- spsa "${{ inputs.iterations }}" \
            > artifacts/spsa-tuning.tsv
      - name: Upload tuned parameters
        uses: actions/upload-artifact@v4
        with:
          name: spsa-tuning-tsv
          path: artifacts/spsa-tuning.tsv
