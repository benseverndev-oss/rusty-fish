name: Syzygy Corpus

on:
  push:
    paths:
      - 'engine-core/**'
      - 'engine-search/**'
      - '.github/workflows/syzygy-corpus.yml'
  pull_request:
    paths:
      - 'engine-core/**'
      - 'engine-search/**'
      - '.github/workflows/syzygy-corpus.yml'
  workflow_dispatch:

jobs:
  kqvk:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Download and verify KQvK Syzygy corpus
        run: |
          mkdir -p syzygy-test
          curl --fail --location --retry 3 --output syzygy-test/KQvK.rtbw https://tablebase.lichess.ovh/tables/standard/3-4-5-wdl/KQvK.rtbw
          curl --fail --location --retry 3 --output syzygy-test/KQvK.rtbz https://tablebase.lichess.ovh/tables/standard/3-4-5-dtz/KQvK.rtbz
          echo '517667dff787162dbb1ed9d5d6484d30ee854e686ee0675c08d99ecf045d2d50  syzygy-test/KQvK.rtbw' | sha256sum --check --status
          echo '71ea9444fa5bd42897d781a0c356975ea6f23e0f65a4254e470897031c161c8c  syzygy-test/KQvK.rtbz' | sha256sum --check --status
      - name: Verify exact KQvK WDL and DTZ
        env:
          RUSTY_FISH_SYZYGY_TEST_DIR: ${{ github.workspace }}/syzygy-test
        run: cargo test -p engine-search checksummed_kqvk_corpus_returns_exact_win_and_dtz
